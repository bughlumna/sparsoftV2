# nixpacks.toml
# Explicitly tells Railway/Nixpacks this is a Python 3.11 project.
# Prevents the "pip not found" error caused by stack mis-detection.

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
