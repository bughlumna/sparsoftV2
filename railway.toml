# railway.toml — Railway deployment configuration
# Commit this file to the repo root.
# Railway detects it automatically when you create services.

[build]
builder = "nixpacks"
buildCommand     = "pip install -r requirements.txt"

# ── Backend service ───────────────────────────────────────────────────────────
# In Railway dashboard: New Service → GitHub Repo → set Root Directory = backend
# Then link the Postgres plugin → DATABASE_URL is injected automatically.
[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
